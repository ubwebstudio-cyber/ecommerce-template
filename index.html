<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHOP — Modern E-Commerce</title>
  <script>
    (function () {
      var s = localStorage.getItem('shop-theme');
      var d = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.setAttribute('data-theme', s === 'dark' || (!s && d) ? 'dark' : 'light');
    }());
  </script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Scroll progress bar -->
  <div class="scroll-progress" id="scroll-progress" aria-hidden="true"></div>

  <!-- Blob canvas background -->
  <canvas id="blob-canvas" aria-hidden="true"></canvas>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="container navbar-inner">
      <a href="index.html" class="navbar-logo">SHOP</a>
      <button class="navbar-toggle" id="navbar-toggle" aria-label="Toggle menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <button class="theme-toggle" id="theme-toggle" aria-label="Switch to dark mode" title="Switch to dark mode">
        <svg class="theme-icon theme-icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="theme-icon theme-icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <ul class="navbar-links" id="navbar-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="#products">Shop</a></li>
        <li>
          <a href="cart.html" class="cart-link">
            Cart <span class="cart-badge" id="cart-count">0</span>
          </a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <!-- Floating blob decorations -->
    <div class="hero-blob hero-blob-1" aria-hidden="true"></div>
    <div class="hero-blob hero-blob-2" aria-hidden="true"></div>

    <div class="container">
      <p class="hero-label">New Season Collection</p>
      <h1 class="hero-title">Clean Essentials<br><span id="hero-typewriter"></span><span class="typewriter-cursor" aria-hidden="true">|</span></h1>
      <p class="hero-subtitle">Thoughtfully designed products built for simplicity, quality, and lasting style.</p>
      <div class="hero-actions">
        <a href="#products" class="btn btn-primary btn-lg btn-glow">Shop Now</a>
        <a href="#products" class="btn btn-outline btn-lg">View All</a>
      </div>
    </div>
  </section>

  <!-- PRODUCTS SECTION -->
  <section id="products" style="padding-top: var(--space-8); padding-bottom: var(--space-20);">
    <div class="container">

      <div class="section-header">
        <h2 class="section-title">All Products</h2>
        <p class="section-subtitle">Explore our full range across all categories.</p>
      </div>

      <!-- Toolbar: search + sort -->
      <div class="products-toolbar">
        <div class="search-wrapper">
          <span class="search-icon" aria-hidden="true">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </span>
          <input
            type="search"
            id="search-input"
            class="search-input"
            placeholder="Search products…"
            aria-label="Search products"
          />
        </div>
        <div class="sort-select-wrapper">
          <select id="sort-select" class="sort-select" aria-label="Sort products">
            <option value="default">Sort: Featured</option>
            <option value="price-asc">Price: Low to High</option>
            <option value="price-desc">Price: High to Low</option>
            <option value="name-asc">Name: A–Z</option>
            <option value="name-desc">Name: Z–A</option>
          </select>
        </div>
      </div>

      <!-- Category filters -->
      <div class="category-filters" id="category-filters" role="group" aria-label="Filter by category">
        <button class="filter-btn active" data-category="all">All</button>
        <button class="filter-btn" data-category="clothing">Clothing</button>
        <button class="filter-btn" data-category="electronics">Electronics</button>
        <button class="filter-btn" data-category="accessories">Accessories</button>
        <button class="filter-btn" data-category="footwear">Footwear</button>
      </div>

      <p class="products-count" id="products-count"></p>

      <!-- Product grid -->
      <ul class="products-grid" id="products-grid" aria-label="Products"></ul>

    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2025 SHOP. Built with plain HTML, CSS &amp; JavaScript.</p>
    </div>
  </footer>

  <!-- Back to top -->
  <button class="back-to-top" aria-label="Back to top" title="Back to top">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="18 15 12 9 6 15"/>
    </svg>
  </button>

  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/templates.js"></script>
  <script src="js/main.js"></script>
  <script>
    (function () {
      var activeCategory = 'all';
      var searchQuery    = '';
      var sortOrder      = 'default';

      function getFiltered() {
        var list = products.slice();

        if (activeCategory !== 'all') {
          list = list.filter(function (p) { return p.category === activeCategory; });
        }
        if (searchQuery) {
          var q = searchQuery.toLowerCase();
          list = list.filter(function (p) {
            return p.name.toLowerCase().indexOf(q) !== -1 ||
                   p.category.toLowerCase().indexOf(q) !== -1 ||
                   p.description.toLowerCase().indexOf(q) !== -1;
          });
        }
        if (sortOrder === 'price-asc')  list.sort(function (a, b) { return a.price - b.price; });
        if (sortOrder === 'price-desc') list.sort(function (a, b) { return b.price - a.price; });
        if (sortOrder === 'name-asc')   list.sort(function (a, b) { return a.name.localeCompare(b.name); });
        if (sortOrder === 'name-desc')  list.sort(function (a, b) { return b.name.localeCompare(a.name); });

        return list;
      }

      function resetFilters() {
        activeCategory = 'all';
        searchQuery    = '';
        sortOrder      = 'default';
        document.getElementById('search-input').value  = '';
        document.getElementById('sort-select').value   = 'default';
        document.querySelectorAll('.filter-btn').forEach(function (b) {
          b.classList.toggle('active', b.dataset.category === 'all');
        });
        renderGrid();
      }

      function skeletonHTML() {
        var cards = '';
        for (var i = 0; i < 8; i++) {
          cards += '<li class="skeleton-card">' +
            '<div class="skeleton-img"></div>' +
            '<div class="skeleton-body">' +
              '<div class="skeleton-line short"></div>' +
              '<div class="skeleton-line"></div>' +
              '<div class="skeleton-line price"></div>' +
            '</div>' +
          '</li>';
        }
        return cards;
      }

      var skeletonShown = false;

      function renderGrid() {
        var grid     = document.getElementById('products-grid');
        var countEl  = document.getElementById('products-count');
        var filtered = getFiltered();

        // Fade animation on re-render
        grid.classList.add('is-filtering');
        setTimeout(function () { grid.classList.remove('is-filtering'); }, 150);

        countEl.textContent = filtered.length + ' product' + (filtered.length !== 1 ? 's' : '');

        if (filtered.length === 0) {
          grid.innerHTML =
            '<li class="products-empty">' +
              'No products match your search. ' +
              '<button class="btn btn-ghost" id="clear-filters-btn" style="font-size:inherit;text-decoration:underline;padding:0;">Clear filters</button>' +
            '</li>';
          document.getElementById('clear-filters-btn').addEventListener('click', resetFilters);
          return;
        }

        grid.innerHTML = filtered.map(renderProductCard).join('');
      }

      // Initial render: show skeletons for 800ms, then real products
      var grid = document.getElementById('products-grid');
      grid.innerHTML = skeletonHTML();
      document.getElementById('products-count').textContent = '';

      setTimeout(function () {
        renderGrid();
      }, 800);

      // Category filter
      document.getElementById('category-filters').addEventListener('click', function (e) {
        var btn = e.target.closest('.filter-btn');
        if (!btn) return;
        document.querySelectorAll('.filter-btn').forEach(function (b) { b.classList.remove('active'); });
        btn.classList.add('active');
        activeCategory = btn.dataset.category;
        renderGrid();
      });

      // Search
      document.getElementById('search-input').addEventListener('input', function (e) {
        searchQuery = e.target.value.trim();
        renderGrid();
      });

      // Sort
      document.getElementById('sort-select').addEventListener('change', function (e) {
        sortOrder = e.target.value;
        renderGrid();
      });

    })();
  </script>
</body>
</html>
